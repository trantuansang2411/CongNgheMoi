syntax = "proto3";

package course;

service CourseService {
  rpc GetCoursePrice (CoursePriceRequest) returns (CoursePriceResponse);
  rpc ValidateCoupon (ValidateCouponRequest) returns (ValidateCouponResponse);
  rpc GetCourseBasicInfo (CourseBasicInfoRequest) returns (CourseBasicInfoResponse);
  rpc PublishCourse (PublishCourseRequest) returns (PublishCourseResponse);
  rpc HideCourse (HideCourseRequest) returns (HideCourseResponse);
}

message CoursePriceRequest {
  string course_id = 1;
}

message CoursePriceResponse {
  string course_id = 1;
  string title = 2;
  string instructor_id = 3;
  double base_price = 4;
  double sale_price = 5;
  string currency = 6;
  string status = 7;
}

message ValidateCouponRequest {
  string course_id = 1;
  string code = 2;
}

message ValidateCouponResponse {
  bool valid = 1;
  string discount_type = 2;
  double discount_value = 3;
  string message = 4;
}

message CourseBasicInfoRequest {
  string course_id = 1;
}

message CourseBasicInfoResponse {
  string course_id = 1;
  string title = 2;
  string instructor_id = 3;
  int32 total_lessons = 4;
  string status = 5;
}

message PublishCourseRequest {
  string course_id = 1;
}

message PublishCourseResponse {
  bool success = 1;
  string message = 2;
}

message HideCourseRequest {
  string course_id = 1;
}

message HideCourseResponse {
  bool success = 1;
  string message = 2;
}
